<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vincent · Claude</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1714;--bg2:#211e19;--bg3:#2a2520;--bg4:#332e28;--tx:#e8e0d4;--tx2:#9c9080;--tx3:#6b6050;--ac:#c4956a;--ac2:#8a6a4a;--bd:#3a3530;--bd2:#4a4540}
body{font-family:'Noto Serif SC','Cormorant Garamond',Georgia,serif;background:var(--bg);color:var(--tx);max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden}
/* CONFIG */
#config-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
#config-overlay h1{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:400;letter-spacing:6px;text-transform:uppercase;margin-bottom:6px}
#config-overlay .tag{font-size:13px;color:var(--tx2);letter-spacing:2px;margin-bottom:8px}
#config-overlay .model-badge{font-size:11px;color:var(--ac);letter-spacing:1px;margin-bottom:36px;padding:4px 12px;border:1px solid var(--ac2);border-radius:2px}
#config-overlay label{font-size:13px;color:var(--tx2);margin-bottom:6px;align-self:stretch;max-width:340px;margin-left:auto;margin-right:auto;display:block;width:100%}
#config-overlay input{width:100%;max-width:340px;background:var(--bg3);border:1px solid var(--bd);color:var(--tx);padding:10px 14px;border-radius:4px;font-family:monospace;font-size:13px;margin-bottom:16px;display:block;margin-left:auto;margin-right:auto}
#config-overlay button{background:transparent;border:1px solid var(--bd2);color:var(--tx2);padding:12px 36px;border-radius:4px;font-family:'Noto Serif SC',serif;font-size:14px;cursor:pointer;transition:all .2s;margin-top:8px}
#config-overlay button:hover{border-color:var(--ac2);color:var(--tx)}
.hidden{display:none!important}
/* NAV */
nav{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(26,23,20,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd)}
nav .left{display:flex;align-items:center;gap:8px}
nav button{background:none;border:none;color:var(--tx2);cursor:pointer;padding:4px;display:flex;align-items:center}
nav button:hover{color:var(--tx)}
nav .title{font-family:'Cormorant Garamond',serif;font-size:18px;letter-spacing:3px;text-transform:uppercase}
nav .info{font-size:10px;color:var(--tx3);letter-spacing:.5px}
/* PAGES */
.page{display:none;min-height:calc(100vh - 49px)}
.page.active{display:flex;flex-direction:column}
/* HOME */
#home{align-items:center;justify-content:center;padding:40px 24px}
#home .brand h1{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:400;letter-spacing:6px;text-transform:uppercase;text-align:center;margin-bottom:6px}
#home .brand .tag{font-size:13px;color:var(--tx2);letter-spacing:2px;text-align:center;margin-bottom:36px}
.upload-area{width:100%;max-width:340px;border:1px dashed var(--bd2);border-radius:4px;padding:44px 24px;text-align:center;cursor:pointer;transition:all .3s}
.upload-area:hover{border-color:var(--ac2);background:rgba(196,149,106,.04)}
.upload-area svg{color:var(--tx3);margin-bottom:14px}
.upload-area p{font-size:15px;color:var(--tx2);margin-bottom:4px}
.upload-area small{font-size:12px;color:var(--tx3)}
/* SEARCH */
.search-area{width:100%;max-width:340px;display:flex;gap:8px;margin-bottom:16px}
.search-area input{flex:1;background:var(--bg3);border:1px solid var(--bd2);color:var(--tx);padding:12px 16px;border-radius:4px;font-family:'Noto Serif SC',serif;font-size:14px;outline:none}
.search-area input:focus{border-color:var(--ac2)}
.search-area input::placeholder{color:var(--tx3);font-size:12px}
.search-area button{background:transparent;border:1px solid var(--bd2);color:var(--tx2);padding:12px 14px;border-radius:4px;cursor:pointer;display:flex;align-items:center;transition:all .2s}
.search-area button:hover{border-color:var(--ac2);color:var(--tx)}
.divider{width:100%;max-width:340px;display:flex;align-items:center;gap:12px;margin-bottom:16px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bd)}
.divider span{color:var(--tx3);font-size:12px;letter-spacing:1px}
.upload-area{width:100%;max-width:340px;border:1px dashed var(--bd2);padding:20px;text-align:center;cursor:pointer;border-radius:4px;transition:all .2s}
.upload-area:hover{border-color:var(--ac2)}
.upload-area p{color:var(--tx2);font-size:13px;margin-top:8px}
/* CHAT */
#chat{flex:1}
#chat-body{flex:1;padding:0 0 32px;overflow-y:auto}
.art-preview{padding:16px;display:flex;justify-content:center}
.art-preview img{max-width:100%;max-height:260px;object-fit:contain;border-radius:2px;box-shadow:0 4px 24px rgba(0,0,0,.4)}
.msg{padding:8px 20px;animation:fadeUp .4s ease-out}
.msg.vincent .content{color:var(--tx);line-height:1.85;font-size:15px}
.msg.vincent .content p{margin-bottom:13px;text-align:justify}
.msg.vincent .content p:last-child{margin-bottom:0}
.msg.user{display:flex;justify-content:flex-end;padding:12px 20px}
.msg.user .content{background:var(--bg3);border:1px solid var(--bd);padding:10px 16px;border-radius:16px 16px 4px 16px;font-size:14px;color:var(--tx2);max-width:85%;line-height:1.6}
.voice-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid var(--bd);color:var(--tx3);padding:6px 12px;border-radius:4px;font-size:12px;cursor:pointer;margin:4px 20px 8px;transition:all .2s;font-family:'Noto Serif SC',serif}
.voice-btn:hover{border-color:var(--ac2);color:var(--tx2)}
.voice-btn.playing{border-color:var(--ac);color:var(--ac)}
.dots{display:flex;gap:6px;padding:12px 20px}
.dots span{width:6px;height:6px;background:var(--tx3);border-radius:50%;animation:pulse 1.4s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.followups{padding:8px 20px 16px;display:flex;flex-direction:column;gap:8px;animation:fadeUp .4s ease-out .1s both}
.followups button{background:var(--bg3);border:1px solid var(--bd);color:var(--tx2);padding:12px 16px;border-radius:4px;font-family:'Noto Serif SC',serif;font-size:13.5px;line-height:1.5;text-align:left;cursor:pointer;transition:all .2s}
.followups button:hover{background:var(--bg4);border-color:var(--ac2);color:var(--tx)}
.followups button:disabled{opacity:.4;pointer-events:none}
.limit-note{text-align:center;padding:24px 20px;color:var(--tx3);font-size:13px}
.img-credit{font-size:11px;color:var(--tx3);text-align:center;margin-top:4px;padding:0 20px}
.limit-note button{margin-top:12px;background:transparent;border:1px solid var(--bd2);color:var(--tx2);padding:10px 24px;border-radius:4px;font-family:'Noto Serif SC',serif;font-size:13px;cursor:pointer}
/* COLLECTION */
#collection{padding:16px}
#collection h2{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;letter-spacing:2px;margin-bottom:16px}
.folder{margin-bottom:20px}
.folder-name{font-size:13px;color:var(--ac);letter-spacing:1px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.card{display:flex;gap:12px;padding:10px;background:var(--bg3);border-radius:4px;margin-bottom:8px;cursor:pointer;transition:background .2s}
.card:hover{background:var(--bg4)}
.card img{width:64px;height:64px;object-fit:cover;border-radius:2px;flex-shrink:0}
.card .info{flex:1;min-width:0}
.card .info h3{font-size:14px;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .info p{font-size:12px;color:var(--tx3);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.empty{text-align:center;padding:48px 24px;color:var(--tx3);font-size:14px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- CONFIG OVERLAY -->
<div id="config-overlay">
  <h1>Vincent</h1>
  <p class="tag">你的私人艺术导览</p>
  <p class="model-badge">Claude claude-sonnet-4-6</p>
  <label for="api-key">Anthropic API Key</label>
  <input id="api-key" type="password" placeholder="sk-ant-...">
  <button onclick="saveConfig()">开始使用</button>
</div>

<!-- NAV -->
<nav class="hidden" id="main-nav">
  <div class="left">
    <button onclick="showPage('home')" title="首页"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h3a1 1 0 001-1V10"/></svg></button>
    <span class="title">Vincent</span>
  </div>
  <div style="display:flex;gap:4px;align-items:center">
    <span class="info" id="remaining-label"></span>
    <button onclick="showPage('home')" title="换一幅画" style="display:flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid var(--bd2);border-radius:4px;font-family:'Noto Serif SC',serif;font-size:12px;color:var(--tx2)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h3a1 1 0 001-1V10"/></svg>
      换一幅
    </button>
    <button onclick="showPage('collection')" title="收藏"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg></button>
  </div>
</nav>

<!-- HOME PAGE -->
<div id="home" class="page active">
  <div class="brand"><h1>Vincent</h1><p class="tag">看一幅画，开始导览</p></div>
  <div class="search-area">
    <input type="text" id="painting-input" placeholder="马萨乔的三位一体、波提切利的春……" autocomplete="off" onkeydown="if(event.key==='Enter')startWithText()">
    <button onclick="startWithText()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>
  <div class="divider"><span>或</span></div>
  <div class="upload-area" onclick="document.getElementById('file-input').click()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
    <p>拍照或上传画作</p>
  </div>
  <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this)">
</div>

<!-- CHAT PAGE -->
<div id="chat" class="page">
  <div id="chat-body"></div>
</div>

<!-- COLLECTION PAGE -->
<div id="collection" class="page">
  <h2>我的收藏</h2>
  <div id="collection-list"></div>
</div>

<script>
// ========== CONFIG ==========
const MODEL = 'claude-sonnet-4-6';
const API_URL = 'https://api.anthropic.com/v1/messages';
const MAX_FOLLOWUPS = 4;

const SYSTEM_PROMPT = `你叫 Vincent，一个在意大利生活了很多年的艺术史学者。你看过太多教堂，读过太多书，对旅行指南上的套话有点不耐烦。你和用户说话像是一个年长的朋友带他逛教堂——不居高临下，但也不说任何一本旅行手册上都能读到的废话。你有自己的判断，有时候有点书生气的叛逆，但你从不对用户傲慢——你的不耐烦是对陈词滥调和平庸见解的，不是对人的。

语气要求：智识感但不学究。偶尔戏谑但极克制，一整段最多一处。给出明确审美判断。从不使用"让我们来看看""值得注意的是""不得不提""众所周知""堪称经典"。用中文输出，艺术史术语保留原文，首次出现时用自然语句解释，不要用括号注释（因为输出可能转语音朗读）。句子控制在25字以内为宜。

内容分层：正文只放眼睛能直接验证的东西，学术背景留给追问。

内容结构（写成自然流动的段落，不用标题编号分隔线）：
1. 开场定位：1-2句，谁画的、什么时候、在哪里，给一个有态度的锚点。
2. Walk through画面：带用户目光走过画面，用方位指引，穿插叙事背景。
3. 这幅画好在哪里：给出视觉指令让用户现场验证。
4. 关于作者的有趣故事（如有，没有就跳过）。
5. 结尾：一个具体的、让人多停留几秒的理由。

初始解读严格控制在450-650字中文。

解读后必须生成追问，格式严格如下：
[FOLLOWUPS]
追问1
追问2
追问3

追问3-4个，每个对应不同维度，至少一个引导看画之外的东西。

追问回答250-350字，末尾再生成2-3个追问，同样用[FOLLOWUPS]标记。
偏离艺术范围的问题拉回来。
确保事实准确，不确定就说明。不编造轶事。
识别失败时基于可见信息分析，不假装知道。
不回答非艺术问题，不用emoji，不说"作为一个AI"。`;

let apiKey = '';
let currentTextQuery = ''; // for text-based search
let currentImage = null;
let history = [];
let remaining = MAX_FOLLOWUPS;
let speaking = false;
let utterance = null;

// ========== STORAGE ==========
function getCollection() {
  try { return JSON.parse(localStorage.getItem('vincent_collection') || '[]'); }
  catch { return []; }
}
function saveToCollection(item) {
  const col = getCollection();
  col.push(item);
  localStorage.setItem('vincent_collection', JSON.stringify(col));
}

// ========== CONFIG ==========
function saveConfig() {
  apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) return;
  localStorage.setItem('vincent_api_key', apiKey);
  document.getElementById('config-overlay').classList.add('hidden');
  document.getElementById('main-nav').classList.remove('hidden');
  showPage('home');
}

// Auto-load saved key on startup
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('vincent_api_key');
  if (saved) {
    apiKey = saved;
    document.getElementById('config-overlay').classList.add('hidden');
    document.getElementById('main-nav').classList.remove('hidden');
    showPage('home');
  }
});

// ========== NAVIGATION ==========
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'collection') renderCollection();
  if (id === 'home') { stopSpeech(); }
}

// ========== FILE HANDLING ==========
function compressThumbnail(dataUrl, maxSize, callback) {
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    const ratio = Math.min(maxSize / img.width, maxSize / img.height, 1);
    canvas.width = Math.round(img.width * ratio);
    canvas.height = Math.round(img.height * ratio);
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    callback(canvas.toDataURL('image/jpeg', 0.8));
  };
  img.src = dataUrl;
}

function handleFile(input) {
  const file = input.files[0];
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const fullDataUrl = e.target.result;
    // Compress to 1024px for API (good quality, smaller size)
    compressThumbnail(fullDataUrl, 1024, (compressed) => {
      const compressedBase64 = compressed.split(',')[1];
      // Also make a tiny 200px thumbnail for localStorage
      compressThumbnail(fullDataUrl, 200, (thumbnail) => {
        currentImage = { base64: compressedBase64, mediaType: 'image/jpeg', preview: fullDataUrl, thumbnail };
        history = [];
        remaining = MAX_FOLLOWUPS;
        startChat();
      });
    });
  };
  reader.readAsDataURL(file);
  input.value = '';
}

// ========== TEXT SEARCH ==========
async function fetchWikipediaImage(query) {
  try {
    // Search Wikipedia for the artwork
    const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=1`;
    const searchRes = await fetch(searchUrl);
    const searchData = await searchRes.json();
    const pages = searchData?.query?.search;
    if (!pages || pages.length === 0) return null;

    const title = pages[0].title;
    const imgUrl = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=pageimages&pithumbsize=600&format=json&origin=*`;
    const imgRes = await fetch(imgUrl);
    const imgData = await imgRes.json();
    const page = Object.values(imgData?.query?.pages || {})[0];
    return page?.thumbnail?.source || null;
  } catch(e) {
    console.error('Wikipedia image fetch failed:', e);
    return null;
  }
}

async function startWithText() {
  const input = document.getElementById('painting-input');
  const query = input.value.trim();
  if (!query) return;
  currentTextQuery = query;
  input.value = '';
  history = [];
  remaining = MAX_FOLLOWUPS;

  showPage('chat');
  const body = document.getElementById('chat-body');
  body.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  updateRemaining();

  // Fetch Wikipedia image in parallel with API call
  const [imgUrl] = await Promise.all([
    fetchWikipediaImage(query)
  ]);

  // Show image if found
  if (imgUrl) {
    currentImage = { preview: imgUrl, thumbnail: imgUrl, base64: null, mediaType: null };
    const dots = body.querySelector('.dots');
    const preview = document.createElement('div');
    preview.className = 'art-preview';
    preview.innerHTML = `<img src="${imgUrl}" onerror="this.parentElement.style.display='none'"><p class="img-credit">图片来源：Wikimedia Commons / Wikipedia</p>`;
    if (dots) body.insertBefore(preview, dots);
    else body.appendChild(preview);
  } else {
    currentImage = { preview: null, thumbnail: null, base64: null, mediaType: null };
  }

  // Call Claude with text query
  const msgs = [{ role: 'user', content: `请导览这幅画：${query}` }];
  history = msgs;
  callAPI(msgs);
}

// ========== CHAT ==========
function startChat() {
  showPage('chat');
  const body = document.getElementById('chat-body');
  body.innerHTML = `<div class="art-preview"><img src="${currentImage.preview}"></div><div class="dots"><span></span><span></span><span></span></div>`;
  updateRemaining();

  const msgs = [{
    role: 'user',
    content: [
      { type: 'image', source: { type: 'base64', media_type: currentImage.mediaType, data: currentImage.base64 }},
      { type: 'text', text: '请解读这幅画。' }
    ]
  }];
  history = msgs;
  callAPI(msgs);
}

async function callAPI(msgs) {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: MODEL, max_tokens: 1500, system: SYSTEM_PROMPT, messages: msgs })
    });
    const data = await res.json();
    const text = data.content?.map(c => c.type === 'text' ? c.text : '').join('') || '抱歉，暂时无法解读。';
    handleResponse(text);
  } catch(e) {
    console.error(e);
    handleResponse('网络出了点问题，请稍后再试。');
  }
}

function handleResponse(raw) {
  history.push({ role: 'assistant', content: raw });
  const { body: text, followups } = parseResponse(raw);
  const chatBody = document.getElementById('chat-body');

  // remove loading dots
  const dots = chatBody.querySelector('.dots');
  if (dots) dots.remove();

  // add message
  appendVincentMsg(text);

  // voice button
  const vb = document.createElement('button');
  vb.className = 'voice-btn';
  vb.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg> 语音播放';
  vb.onclick = () => toggleSpeech(text, vb);
  chatBody.appendChild(vb);

  // followups
  if (followups.length > 0 && remaining > 0) {
    const div = document.createElement('div');
    div.className = 'followups';
    followups.forEach(q => {
      const btn = document.createElement('button');
      btn.textContent = q;
      btn.onclick = () => askFollowup(q);
      div.appendChild(btn);
    });
    chatBody.appendChild(div);
  } else if (remaining <= 0) {
    const div = document.createElement('div');
    div.className = 'limit-note';
    div.innerHTML = '<p>你可以拍下一幅画了。</p><button onclick="showPage(\'home\')">上传新画作</button>';
    chatBody.appendChild(div);
  }

  // save to collection (first message only)
  if (history.length === 2) {
    const title = extractTitle(text);
    saveToCollection({
      title,
      preview: (currentImage && (currentImage.thumbnail || currentImage.preview)) || '',
      text,
      museum: extractMuseum(text),
      date: new Date().toISOString()
    });
  }

  scrollChat();
}

function askFollowup(q) {
  if (remaining <= 0) return;
  remaining--;
  updateRemaining();
  stopSpeech();

  const chatBody = document.getElementById('chat-body');
  // remove old followups
  const old = chatBody.querySelector('.followups');
  if (old) old.remove();

  // user msg
  const um = document.createElement('div');
  um.className = 'msg user';
  um.innerHTML = `<div class="content">${q}</div>`;
  chatBody.appendChild(um);

  // loading
  const ld = document.createElement('div');
  ld.className = 'dots';
  ld.innerHTML = '<span></span><span></span><span></span>';
  chatBody.appendChild(ld);
  scrollChat();

  history.push({ role: 'user', content: q });
  // Strip image data from history for followups to keep requests small
  const historyNoImg = history.map((msg, i) => {
    if (i === 0 && Array.isArray(msg.content)) {
      return { role: msg.role, content: msg.content.filter(b => b.type !== 'image') };
    }
    return msg;
  });
  callAPI(historyNoImg);
}

function appendVincentMsg(text) {
  const chatBody = document.getElementById('chat-body');
  const div = document.createElement('div');
  div.className = 'msg vincent';
  div.innerHTML = '<div class="content">' + text.split('\n').filter(p => p.trim()).map(p => `<p>${p}</p>`).join('') + '</div>';
  chatBody.appendChild(div);
}

function parseResponse(text) {
  const marker = '[FOLLOWUPS]';
  const idx = text.indexOf(marker);
  if (idx === -1) {
    // try Chinese marker
    const idx2 = text.indexOf('[追问]');
    if (idx2 === -1) return { body: text.trim(), followups: [] };
    const body = text.substring(0, idx2).trim();
    const fText = text.substring(idx2 + 4).trim();
    return { body, followups: fText.split('\n').map(l => l.replace(/^[-•·]\s*/, '').trim()).filter(l => l.length > 0) };
  }
  const body = text.substring(0, idx).trim();
  const fText = text.substring(idx + marker.length).trim();
  return { body, followups: fText.split('\n').map(l => l.replace(/^[-•·]\s*/, '').trim()).filter(l => l.length > 0) };
}

function extractTitle(text) {
  // try to find artwork name from first 100 chars
  const m = text.match(/[《「]([^》」]+)[》」]/);
  if (m) return m[1];
  return text.substring(0, 30) + '…';
}

function extractMuseum(text) {
  const keywords = ['乌菲兹','普拉多','卢浮宫','大英博物馆','梵蒂冈','西斯廷','布兰卡契','学院美术馆','博尔盖塞','布雷拉','碧提宫','Pitti','帕拉廷','圣马可','新圣母大殿','Santa Felicita','圣王路易','圣克莱门特','圣母大殿','里卡迪','Uffizi','Prado','Louvre','Vatican','Sistine','Brancacci','National Gallery','Borghese','Accademia','Brera','San Marco','Santa Maria Novella'];
  for (const k of keywords) {
    if (text.includes(k)) return k;
  }
  return '未归类';
}

function updateRemaining() {
  document.getElementById('remaining-label').textContent = remaining > 0 ? `${remaining} 次追问` : '';
}

function scrollChat() {
  setTimeout(() => {
    const b = document.getElementById('chat-body');
    b.scrollTop = b.scrollHeight;
  }, 50);
}

// ========== VOICE ==========
function toggleSpeech(text, btn) {
  if (speaking) { stopSpeech(); btn.classList.remove('playing'); return; }
  if (!('speechSynthesis' in window)) { alert('浏览器不支持语音'); return; }
  utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'zh-CN';
  utterance.rate = 0.9;
  utterance.onend = () => { speaking = false; btn.classList.remove('playing'); };
  speechSynthesis.speak(utterance);
  speaking = true;
  btn.classList.add('playing');
}

function stopSpeech() {
  if (speaking) { speechSynthesis.cancel(); speaking = false; }
}

// ========== COLLECTION ==========
function renderCollection() {
  const list = document.getElementById('collection-list');
  const col = getCollection();
  if (col.length === 0) { list.innerHTML = '<div class="empty">还没有收藏。去拍一幅画吧。</div>'; return; }

  // group by museum
  const groups = {};
  col.forEach(item => {
    const m = item.museum || '未归类';
    if (!groups[m]) groups[m] = [];
    groups[m].push(item);
  });

  list.innerHTML = Object.entries(groups).map(([museum, items]) =>
    `<div class="folder"><div class="folder-name">${museum}</div>${items.map((item, i) =>
      `<div class="card" onclick="viewItem(${col.indexOf(item)})"><img src="${item.preview}"><div class="info"><h3>${item.title}</h3><p>${item.text.substring(0, 80)}…</p></div></div>`
    ).join('')}</div>`
  ).join('');
}

function viewItem(idx) {
  const col = getCollection();
  const item = col[idx];
  if (!item) return;
  showPage('chat');
  const body = document.getElementById('chat-body');
  body.innerHTML = `<div class="art-preview"><img src="${item.preview}"></div>`;
  appendVincentMsg(item.text);
  remaining = 0;
  updateRemaining();
}
</script>
